services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: sh docker/entrypoint.sh web
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://business_os:business_os@db:5432/business_os
      REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web,.localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://app.businessos.local,https://app.businessos.local,http://platform.businessos.local,https://platform.businessos.local,http://api.businessos.local,https://api.businessos.local,http://app.localhost,https://app.localhost,http://platform.localhost,https://platform.localhost,http://api.localhost,https://api.localhost
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: sh docker/entrypoint.sh worker
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://business_os:business_os@db:5432/business_os
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: business_os
      POSTGRES_USER: business_os
      POSTGRES_PASSWORD: business_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U business_os -d business_os"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
