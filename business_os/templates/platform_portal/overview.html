{% extends "platform_portal/base.html" %}
{% load i18n %}

{% block content %}
<div class="grid gap-4 md:grid-cols-2">
  <section class="rounded-lg border border-base-300 bg-base-100 p-5">
    <h2 class="font-semibold">{% trans "Module registry" %}</h2>
    <p class="mt-2 text-3xl font-semibold">{{ modules|length }}</p>
  </section>
  <section class="rounded-lg border border-base-300 bg-base-100 p-5">
    <h2 class="font-semibold">{% trans "Organizations" %}</h2>
    <p class="mt-2 text-3xl font-semibold">{{ organizations|length }}</p>
  </section>
</div>
{% endblock %}
