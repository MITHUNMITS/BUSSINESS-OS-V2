{% extends "platform_portal/base.html" %}
{% load i18n %}

{% block page_title %}{% trans "Modules" %}{% endblock %}

{% block content %}
<div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
  {% for module in modules %}
    <article class="rounded-lg border border-base-300 bg-base-100 p-5">
      <h2 class="font-semibold">{{ module.name }}</h2>
      <p class="mt-2 text-sm text-base-content/70">{{ module.description }}</p>
      <p class="mt-4 text-xs uppercase tracking-wide text-base-content/50">{{ module.category }}</p>
    </article>
  {% endfor %}
</div>
{% endblock %}
