name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: business_os
          POSTGRES_USER: business_os
          POSTGRES_PASSWORD: business_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Django check
        env:
          DJANGO_SETTINGS_MODULE: business_os.config.settings.test
        run: python manage.py check
      - name: Tests
        env:
          DJANGO_SETTINGS_MODULE: business_os.config.settings.test
        run: pytest

